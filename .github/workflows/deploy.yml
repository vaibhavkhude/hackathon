name: Build and Deploy to Kubernetes

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: vaibhavkhude

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    # Login to DockerHub
    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Build & Push Patient Service
    - name: Build & Push Patient Image
      run: |
        docker build -t $IMAGE_PREFIX/patient-service:latest ./patient-service
        docker push $IMAGE_PREFIX/patient-service:latest

    # Build & Push Appointment Service
    - name: Build & Push Appointment Image
      run: |
        docker build -t $IMAGE_PREFIX/appointment-service:latest ./appointment-service
        docker push $IMAGE_PREFIX/appointment-service:latest

    # Set up kubectl
    - name: Set up Kubectl
      uses: azure/setup-kubectl@v3

    # Configure Kubeconfig
    - name: Configure Kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
        export KUBECONFIG=$PWD/kubeconfig

    # Deploy to Kubernetes
    - name: Deploy to K8s
      run: |
        kubectl apply -f k8s/
        kubectl rollout restart deployment patient-service
        kubectl rollout restart deployment appointment-service
